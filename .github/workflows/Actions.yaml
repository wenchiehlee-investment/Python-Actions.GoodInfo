        fi
        echo "Duration: ${TOTAL_DURATION}s"
        echo "Files: ${{ steps.file_summary.outputs.current_type_files }} (current type), ${{ steps.file_summary.outputs.total_files }} (total)"
        echo "Stocks: ${{ steps.file_summary.outputs.success_stocks }}/${{ steps.file_summary.outputs.total_stocks }} successful"
        echo "Rate limited: ${{ steps.file_summary.outputs.rate_limited_stocks }}"
        echo "Frequency: ${{ steps.params.outputs.frequency }}"
        echo "Status: Completed"

        DOWNLOAD_STATUS="${{ steps.download.outputs.download_status }}"
        FAILED_STOCKS="${{ steps.file_summary.outputs.failed_stocks }}"
        FAILED_STOCKS="${FAILED_STOCKS:-0}"
        RATE_LIMITED_STOCKS="${{ steps.file_summary.outputs.rate_limited_stocks }}"
        RATE_LIMITED_STOCKS="${RATE_LIMITED_STOCKS:-0}"
        TOTAL_STOCKS="${{ steps.file_summary.outputs.total_stocks }}"
        TOTAL_STOCKS="${TOTAL_STOCKS:-130}"

        # Allow up to 5 stock failures (transient network errors, server hiccups)
        # before marking the entire workflow as failed. With 130 stocks, 5 failures
        # = ~4% failure rate which is acceptable for weekly data updates.
        FAILURE_THRESHOLD=5
        RATE_LIMIT_THRESHOLD=0

        if [[ "$DOWNLOAD_STATUS" == "FAILED" || "$DOWNLOAD_STATUS" == "TIMEOUT" ]]; then
          echo "❌ Marking workflow as failed: download_status=${DOWNLOAD_STATUS:-UNKNOWN}"
          exit 1
        elif [[ "$RATE_LIMITED_STOCKS" -gt "$RATE_LIMIT_THRESHOLD" ]]; then
          echo "❌ Marking workflow as failed: rate_limited_stocks=$RATE_LIMITED_STOCKS > threshold=$RATE_LIMIT_THRESHOLD"
          exit 1
        elif [[ "$FAILED_STOCKS" -gt "$FAILURE_THRESHOLD" ]]; then
          echo "❌ Marking workflow as failed: failed_stocks=$FAILED_STOCKS > threshold=$FAILURE_THRESHOLD"
          exit 1
        elif [[ "$FAILED_STOCKS" -gt 0 ]]; then
          echo "⚠️ Workflow completed with $FAILED_STOCKS minor failure(s) (≤$FAILURE_THRESHOLD threshold) - acceptable"
        fi
