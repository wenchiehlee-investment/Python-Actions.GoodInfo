name: Data Freshness Dispatcher

on:
  schedule:
    # Focus mode: check 30 minutes after the main Type 12 schedule.
    # Current target from README status: Type 12 ShowMonthlyK_ChartFlow (101 success, 29 failed).
    - cron: '30 4,9,16,20 * * *'
  workflow_dispatch:      # Allow manual trigger

jobs:
  check-and-dispatch:
    runs-on: ubuntu-latest
    env:
      FOCUS_DATA_TYPE: '12'
      FOCUS_DATA_NAME: 'ShowMonthlyK_ChartFlow'
    permissions:
      actions: write
      contents: read
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.9'

      - name: Check Main Downloader Availability
        id: availability
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          echo "Checking whether GoodInfo Downloader is already queued or running..."

          ACTIVE_RUNS=$(gh run list \
            --workflow Actions.yaml \
            --status in_progress \
            --limit 20 \
            --json databaseId \
            --jq length)
          QUEUED_RUNS=$(gh run list \
            --workflow Actions.yaml \
            --status queued \
            --limit 20 \
            --json databaseId \
            --jq length)
          PENDING_RUNS=$(gh run list \
            --workflow Actions.yaml \
            --status pending \
            --limit 20 \
            --json databaseId \
            --jq length)

          BUSY_COUNT=$((ACTIVE_RUNS + QUEUED_RUNS + PENDING_RUNS))
          echo "Downloader busy count: $BUSY_COUNT (active=$ACTIVE_RUNS, queued=$QUEUED_RUNS, pending=$PENDING_RUNS)"
          echo "busy_count=$BUSY_COUNT" >> $GITHUB_OUTPUT

          if [ "$BUSY_COUNT" -gt 0 ]; then
            echo "⏳ Main downloader is busy. Dispatcher will not trigger another run."
            echo "available=false" >> $GITHUB_OUTPUT
          else
            echo "✅ Main downloader is available."
            echo "available=true" >> $GITHUB_OUTPUT
          fi

      - name: Check Focus Type Status
        id: focus
        if: steps.availability.outputs.available == 'true'
        run: |
          RESULT=$(python3 - <<'PY'
          import csv
          import os

          folder = os.environ["FOCUS_DATA_NAME"]
          path = os.path.join(folder, "download_results.csv")
          done_statuses = {"success", "no_data", "unsupported"}

          if not os.path.exists(path):
              print("complete=false")
              print("total_count=0")
              print("done_count=0")
              print("retryable_count=0")
              print("rate_limited_count=0")
              raise SystemExit

          with open(path, encoding="utf-8", newline="") as f:
              rows = list(csv.DictReader(f))

          def status(row):
              value = (row.get("status") or "").strip().lower()
              if value:
                  return value
              return "success" if (row.get("success") or "").strip().lower() == "true" else "failed"

          total = len(rows)
          done = sum(1 for row in rows if status(row) in done_statuses)
          retryable = sum(
              1 for row in rows
              if status(row) not in done_statuses | {"not_processed", "systemic_failed", "rate_limited"}
          )
          rate_limited = sum(1 for row in rows if status(row) == "rate_limited")
          complete = total >= 130 and done >= 130 and retryable == 0 and rate_limited == 0

          print(f"complete={'true' if complete else 'false'}")
          print(f"total_count={total}")
          print(f"done_count={done}")
          print(f"retryable_count={retryable}")
          print(f"rate_limited_count={rate_limited}")
          PY
          )
          echo "$RESULT" >> "$GITHUB_OUTPUT"
          DONE_COUNT=$(echo "$RESULT" | awk -F= '/^done_count=/{print $2}')
          TOTAL_COUNT=$(echo "$RESULT" | awk -F= '/^total_count=/{print $2}')
          RETRYABLE_COUNT=$(echo "$RESULT" | awk -F= '/^retryable_count=/{print $2}')
          RATE_LIMITED_COUNT=$(echo "$RESULT" | awk -F= '/^rate_limited_count=/{print $2}')
          echo "Focus Type: $FOCUS_DATA_TYPE ($FOCUS_DATA_NAME)"
          echo "Done: $DONE_COUNT/$TOTAL_COUNT"
          echo "Retryable: $RETRYABLE_COUNT"
          echo "Rate limited: $RATE_LIMITED_COUNT"

      - name: Trigger Main Downloader
        if: steps.availability.outputs.available == 'true' && steps.focus.outputs.complete != 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          echo "🎯 Focus mode: triggering Type $FOCUS_DATA_TYPE ($FOCUS_DATA_NAME) failed-only retry."
          gh workflow run Actions.yaml -f data_type="$FOCUS_DATA_TYPE" -f retry_failed_only=true

      - name: Focus Type Complete
        if: steps.availability.outputs.available == 'true' && steps.focus.outputs.complete == 'true'
        run: |
          echo "✅ Focus Type $FOCUS_DATA_TYPE ($FOCUS_DATA_NAME) already reached 130 completed rows. No dispatch needed."
